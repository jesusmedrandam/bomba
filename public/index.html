<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>App Bomba</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="icon.png" />
</head>
<body>

<div class="start-container">

  <div class="start-card">

    <img src="icon.png" class="app-icon" alt="icon">

    <h1 class="app-title">App Bomba</h1>
    <p class="app-subtitle">Monitoreo de niveles del sistema</p>

    <input type="text" id="token" placeholder="Ingrese su token">

    <button class="btn-primary" onclick="entrar()">Ingresar</button>

    <div class="download-area">
      <p class="hint">Para controlar la bomba descargue la App:</p>

      <div class="download-row">
        <img src="icon.png" class="download-icon-big">
        <a href="/app/app-bomba.apk" download class="download-link">Descargar App Android</a>
      </div>
    </div>

    <p id="error"></p>

  </div>

</div>

<script>
function entrar() {
  const token = document.getElementById("token").value.trim();
  if (!token) {
    document.getElementById("error").innerText = "Ingrese un token válido";
    return;
  }
  sessionStorage.setItem("auth", token);
  window.location.href = "/dashboard.html";
}
</script>

</body>
</html>
