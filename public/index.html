<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:sans-serif;
background:#eef6ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:350px;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
width:90px;
margin-bottom:15px;
}

.title{
font-size:20px;
font-weight:bold;
color:#1a4a73;
margin-bottom:10px;
}

.desc{
font-size:14px;
color:#5a7fa3;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #8bb8e0;
font-size:16px;
margin-bottom:15px;
text-align:center;
letter-spacing:2px;
}

.btn{
width:100%;
padding:12px;
border-radius:12px;
border:none;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

.btn-primary{
background:#0095ff;
color:white;
}

.btn-secondary{
background:#f0ad4e;
color:white;
}

.msg{
margin-top:10px;
font-size:14px;
color:#d9534f;
display:none;
}

.loader{
width:14px;
height:14px;
border:3px solid white;
border-bottom-color:transparent;
border-radius:50%;
display:inline-block;
animation:spin 0.8s linear infinite;
margin-right:5px;
}
@keyframes spin{to{transform:rotate(360deg);}}

</style>
</head>

<body>

<div class="box">

<img src="icon.png" class="logo">

<div class="title">Conectar al sistema</div>

<div class="desc">
Ingresa el código de vinculación para acceder al panel web
</div>

<input type="text" id="codigo" placeholder="CÓDIGO">

<button class="btn btn-primary" onclick="acceder()" id="btnAcceder">
Acceder
</button>

<button class="btn btn-secondary" onclick="descargarApp()">
Descargar App
</button>

<div id="msg" class="msg"></div>

</div>

<script>

const URL="https://appbomba.onrender.com/api/render/status";

/* ACCEDER */
function acceder(){

let codigo=document.getElementById("codigo").value.trim();
let btn=document.getElementById("btnAcceder");

if(!codigo){
mostrarMsg("Ingresa el código", true);
return;
}

btn.innerHTML='<span class="loader"></span> Verificando...';
btn.disabled=true;

fetch(URL+"?auth="+codigo)
.then(r=>{
if(!r.ok) throw new Error("conexion");
return r.json();
})
.then(d=>{

btn.innerHTML="Acceder";
btn.disabled=false;

if(!d.recibido){
mostrarMsg("Código incorrecto", true);
return;
}

localStorage.setItem("auth_token", codigo);
window.location.href="dashboard.html";

})
.catch(e=>{

btn.innerHTML="Acceder";
btn.disabled=false;

if(e.message==="conexion"){
mostrarMsg("Sin conexión con el servidor", true);
}else{
mostrarMsg("Error inesperado", true);
}

});

}

/* MENSAJE */
function mostrarMsg(txt,error=false){
let m=document.getElementById("msg");
m.innerText=txt;
m.style.display="block";
m.style.color= error ? "#d9534f" : "#0095ff";
}

/* DETECTAR ANDROID */
function esAndroid(){
return /Android/i.test(navigator.userAgent);
}

/* DESCARGAR APP */
function descargarApp(){

let url="https://raw.githubusercontent.com/jesusmedrandam/bomba/main/public/app/app-bomba.apk";

if(!esAndroid()){
mostrarMsg("Abre este enlace desde Android", true);
window.open(url, "_blank");
return;
}

const link=document.createElement("a");
link.href=url;
link.download="app-bomba.apk";
document.body.appendChild(link);
link.click();
document.body.removeChild(link);

mostrarMsg("Descargando aplicación...", false);

}

</script>

</body>
</html>
