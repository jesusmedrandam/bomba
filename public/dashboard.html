<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel - App Bomba</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icon.png">
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="icon.png" class="header-icon">
    <span class="header-title">App Bomba</span>
  </div>

  <div class="header-buttons">
    <button class="btn-top" onclick="location.href='informacion.html'">Información</button>
    <button class="btn-top" onclick="salir()">Salir</button>
  </div>
</div>

<div class="panel-container">

  <div class="card">
    <h2 class="card-title">Estado del Sistema</h2>

    <p>Bomba: <b id="bombaEstado">---</b></p>
    <p>Modo: <b id="modoEstado">---</b></p>
    <p>Pozo: <b id="pozoEstado">---</b></p>
    <p id="fechaServ">Fecha servidor: ---</p>
  </div>

  <div class="card">
    <h2 class="card-title">Niveles</h2>

    <div class="levels-grid">

      <div class="level-card" style="text-align:center;">
        <h3>Nivel Pozo</h3>
        <svg class="gauge">
          <circle class="bg" cx="100" cy="100" r="80"/>
          <circle class="progress" id="pozoCircle" cx="100" cy="100" r="80"/>
          <text class="value" id="pozoText" x="100" y="110">--%</text>
        </svg>
      </div>

      <div class="level-card" style="text-align:center;">
        <h3>Nivel Tanque</h3>
        <svg class="gauge">
          <circle class="bg" cx="100" cy="100" r="80"/>
          <circle class="progress" id="tanqueCircle" cx="100" cy="100" r="80"/>
          <text class="value" id="tanqueText" x="100" y="110">--%</text>
        </svg>
      </div>

    </div>
  </div>

  <div class="card">
    <h2 class="card-title">Configuraciones</h2>
    <p>Nivel mínimo pozo: <b id="minPozo">---</b></p>
    <p>Profundidad pozo: <b id="profPozo">---</b></p>
    <p>Nivel mínimo tanque: <b id="minTanque">---</b></p>
    <p>Nivel máximo tanque: <b id="maxTanque">---</b></p>
    <p>Altura tanque: <b id="altTanque">---</b></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
